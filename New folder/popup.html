<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; }
    input { width: 100%; margin-bottom: 8px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #001D3D; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #003566; }
    .success { color: green; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h3>New Appointment</h3>
  <input id="name" placeholder="Customer Name" />
  <input id="vehicle" placeholder="Vehicle" />
  <input id="time" type="datetime-local" />
  <button id="generate">Generate Link</button>
  <div id="success" class="success">Link copied!</div>
  <script src="popup.js"></script>
</body>
</html>
